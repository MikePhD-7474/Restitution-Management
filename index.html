<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90E2">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏛️ Church Management System</h1>
            <p class="subtitle">Chisamba Community Church</p>
            <div id="online-status" class="status-indicator"></div>
        </header>

        <nav class="tabs">
            <button class="tab-button active" onclick="showTab('register')">Register Member</button>
            <button class="tab-button" onclick="showTab('members')">View Members</button>
            <button class="tab-button" onclick="showTab('stats')">Statistics</button>
        </nav>

        <!-- Registration Tab -->
        <div id="register-tab" class="tab-content active">
            <h2>Register New Member</h2>
            <form id="member-form">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" required placeholder="+260...">
                </div>

                <div class="form-group">
                    <label for="email">Email (Optional)</label>
                    <input type="email" id="email">
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" rows="2"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob">
                    </div>
                </div>

                <div class="form-group">
                    <label for="membership-date">Membership Date *</label>
                    <input type="date" id="membership-date" required>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="baptized">
                        Baptized
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Member</button>
                    <button type="button" class="btn btn-secondary" onclick="clearForm()">Clear</button>
                </div>
            </form>
        </div>

        <!-- Members List Tab -->
        <div id="members-tab" class="tab-content">
            <div class="members-header">
                <h2>Church Members</h2>
                <input type="text" id="search" placeholder="Search members..." onkeyup="searchMembers()">
            </div>
            <div id="members-list" class="members-grid"></div>
        </div>

        <!-- Statistics Tab -->
        <div id="stats-tab" class="tab-content">
            <h2>Church Statistics</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="total-members">0</h3>
                    <p>Total Members</p>
                </div>
                <div class="stat-card">
                    <h3 id="male-count">0</h3>
                    <p>Male</p>
                </div>
                <div class="stat-card">
                    <h3 id="female-count">0</h3>
                    <p>Female</p>
                </div>
                <div class="stat-card">
                    <h3 id="baptized-count">0</h3>
                    <p>Baptized</p>
                </div>
            </div>
        </div>

        <footer>
            <p>Data stored locally on your device | <span id="last-sync">Never synced</span></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
